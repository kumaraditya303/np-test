name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            arch: x64
          - name: macos-arm64
            os: macos-latest
            arch: arm64
          - name: windows-x64
            os: windows-latest
            arch: x64
            msvc_arch: amd64
          - name: windows-x86
            # windows-latest ships MSVC 14.51 (VS18), whose 32-bit codegen
            # ICEs (C1001) building NumPy. Pin the older, stable MSVC 14.4x
            # toolset by running this job on the windows-2022 image.
            os: windows-2022
            arch: x86
            msvc_arch: x86
            np_config: --config-settings=setup-args=-Dcpu-baseline=none

    steps:
      - uses: actions/checkout@v4

      # Provide the interpreter; `architecture` selects 32-bit vs 64-bit on
      # Windows so we exercise both x86 and x64 ABIs of the extension.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.arch }}

      # The runners ship a stray MinGW gcc (Strawberry Perl) on PATH, which
      # meson would otherwise pick — and on x86 it targets x86_64 and fails.
      # Activate the MSVC toolchain of the matching bitness so meson uses cl.
      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # Build against the released NumPy from PyPI.
      - name: Install build dependencies (NumPy from PyPI)
        run: uv pip install --system numpy meson meson-python ninja

      # Build the extension (Limited C API, abi3) against the PyPI NumPy.
      # Non-editable install so the compiled .so lands in site-packages and
      # is NOT rebuilt when we swap NumPy underneath it below.
      - name: Build and install the extension (against PyPI NumPy)
        run: uv pip install --system --no-build-isolation .

      # Record the compiled .so hash before swapping NumPy. Pure python so it
      # runs the same on bash (Linux/macOS) and pwsh (Windows); no git-bash on
      # PATH means MSVC's link.exe stays ahead of GNU link.exe on Windows.
      - name: Record extension hash (built against PyPI NumPy)
        run: python -c "import datetime_metadata,hashlib,os,numpy; h=hashlib.sha256(open(datetime_metadata.__file__,'rb').read()).hexdigest(); open(os.environ['GITHUB_ENV'],'a').write('EXT_SHA_BEFORE='+h+chr(10)); print('built against PyPI NumPy '+numpy.__version__+'; ext sha256='+h)"

      # Swap in NumPy from the branch under test (built from source by uv) in
      # the default shell so the MSVC toolchain is used on Windows.
      - name: Install branch NumPy
        run: uv pip install --system ${{ matrix.np_config }} "numpy @ git+https://github.com/kumaraditya303/numpy.git@datetime-metadata-limited-api"

      # Assert the .so is byte-identical (no recompile), then run the tests
      # against the branch NumPy.
      - name: Verify no recompile and run tests against branch NumPy
        run: |
          python -c "import datetime_metadata,hashlib,os,sys,numpy; after=hashlib.sha256(open(datetime_metadata.__file__,'rb').read()).hexdigest(); before=os.environ['EXT_SHA_BEFORE']; print('runtime NumPy '+numpy.__version__+'; ext sha256='+after); sys.exit('ERROR: extension recompiled '+before+' -> '+after) if before!=after else print('extension unchanged across NumPy swap; arch '+('64-bit' if sys.maxsize>2**32 else '32-bit'))"
          python test_datetime_metadata.py
