name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            arch: x64
          - name: macos-arm64
            os: macos-latest
            arch: arm64
          - name: windows-x64
            os: windows-latest
            arch: x64
            msvc_arch: amd64
          - name: windows-x86
            os: windows-latest
            arch: x86
            msvc_arch: x86

    steps:
      - uses: actions/checkout@v4

      # Provide the interpreter; `architecture` selects 32-bit vs 64-bit on
      # Windows so we exercise both x86 and x64 ABIs of the extension.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.arch }}

      # The runners ship a stray MinGW gcc (Strawberry Perl) on PATH, which
      # meson would otherwise pick — and on x86 it targets x86_64 and fails.
      # Activate the MSVC toolchain of the matching bitness so meson uses cl.
      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # Build against the released NumPy from PyPI.
      - name: Install build dependencies (NumPy from PyPI)
        run: uv pip install --system numpy meson meson-python ninja

      # Build the extension (Limited C API, abi3) against the PyPI NumPy.
      # Non-editable install so the compiled .so lands in site-packages and
      # is NOT rebuilt when we swap NumPy underneath it below.
      - name: Build and install the extension (against PyPI NumPy)
        run: uv pip install --system --no-build-isolation .

      # Swap in NumPy from the branch under test (built from source by uv),
      # WITHOUT recompiling the extension, then run the tests against it.
      # The sha256 check asserts the .so is byte-identical across the swap.
      - name: Run tests against branch NumPy (no recompile)
        shell: bash
        run: |
          hash_so() { python -c "import datetime_metadata,hashlib; print(hashlib.sha256(open(datetime_metadata.__file__,'rb').read()).hexdigest())"; }
          before=$(hash_so)
          echo "built against PyPI NumPy $(python -c 'import numpy;print(numpy.__version__)'); extension sha256=$before"

          uv pip install --system "numpy @ git+https://github.com/kumaraditya303/numpy.git@datetime-metadata-limited-api"

          after=$(hash_so)
          echo "runtime NumPy $(python -c 'import numpy;print(numpy.__version__)'); extension sha256=$after"
          if [ "$before" != "$after" ]; then
            echo "::error::extension was recompiled when NumPy changed ($before -> $after)"; exit 1
          fi
          echo "extension unchanged across NumPy swap — running tests"

          python -c "import sys; print('arch', '64-bit' if sys.maxsize > 2**32 else '32-bit')"
          python test_datetime_metadata.py
